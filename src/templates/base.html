<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        input:not([type="submit"]):not([type="button"]):not([type="hidden"]):not([type="radio"]):not([type="checkbox"]),
        textarea,
        select {
            @apply bg-[#2d2d2d] border border-gray-700 rounded-lg px-4 py-2 text-white w-full focus:outline-none focus:border-[#026cdf] focus:ring-1 focus:ring-[#026cdf];
        }
    </style>
</head>
<body class="bg-[#121212] text-white min-h-screen">
    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <a href="{% url 'home' %}" class="text-2xl font-black italic tracking-tighter">SECURE<span class="text-[#026cdf]">TIX</span></a>
        <div class="space-x-6 text-sm font-semibold flex items-center">
            <a href="{% url 'home' %}" class="hover:text-[#026cdf]">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="hover:text-[#026cdf]">My Profile</a>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-gray-800 px-4 py-2 rounded-lg hover:bg-red-900 cursor-pointer">Sign Out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="hover:text-[#026cdf]">Login</a>
                <a href="{% url 'register' %}" class="bg-[#026cdf] px-4 py-2 rounded-lg hover:bg-[#0050a8]">Register</a>
            {% endif %}
        </div>
    </nav>
    <main class="p-10">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
