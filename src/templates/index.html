{% extends 'base.html' %}
{% block content %}
<h1 class="text-4xl font-black mb-10">Upcoming Concerts</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for concert in concerts %}
    <div class="bg-[#1e1e1e] p-6 rounded-xl border border-gray-800">
        {% if concert.poster %}
        <img src="{{ concert.poster.url }}" alt="{{ concert.title }} poster" class="w-full h-48 object-cover rounded-lg mb-4">
        {% endif %}
        <h2 class="text-2xl font-bold mb-2">{{ concert.title }}</h2>
        <p class="text-gray-400 mb-4">{{ concert.date }}</p>
        <a href="{% url 'concert_detail' concert.id %}" class="block text-center w-full bg-[#026cdf] py-2 rounded font-bold hover:bg-[#0050a8] transition">
            Buy Now - ${{ concert.price }}
        </a>
    </div>
    {% empty %}
    <p>No concerts available right now.</p>
    {% endfor %}
</div>
{% endblock %}
